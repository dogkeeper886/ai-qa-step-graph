# Integration: the agent↔store channel over MCP (needs the stack up: `make up`).
id: TC-INTEGRATION-001
name: step-store channel — add, paraphrase hit, unrelated miss
suite: integration
priority: 1
timeout: 120000
dependencies: [TC-BUILD-001]
tags: [integration, mcp]

steps:
  - name: Run the smoke test over MCP
    command: npm --prefix step-store run --silent smoke
    timeout: 90000
    expectPatterns:
      - "SMOKE PASSED"
    rejectPatterns:
      - "SMOKE FAILED"

criteria: |
  add_step then search_step returns the paraphrase (distance under threshold),
  and an unrelated phrase is a clean miss — proven deterministically by smoke.ts.
