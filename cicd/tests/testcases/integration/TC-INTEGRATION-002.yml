# Integration: the HTTP transport security gate — Origin floor (#69) + bearer
# token (#70). Self-contained — smoke-http.ts spawns its own server on a test
# port and never touches Postgres (every gate precedes tool handling), no `make up`.
id: TC-INTEGRATION-002
name: HTTP transport guard — origin floor + bearer token reject before any tool
suite: integration
priority: 1
timeout: 60000
dependencies: [TC-BUILD-001]
tags: [integration, mcp, security]

steps:
  - name: Run the HTTP transport-guard test
    command: npm --prefix step-store run --silent smoke:http
    timeout: 45000
    expectPatterns:
      - "HTTP GUARD PASSED"
    rejectPatterns:
      - "HTTP GUARD FAILED"

criteria: |
  With the HTTP transport reachable: GET /healthz is unauthenticated (200); a
  foreign Origin is rejected 403 even with a valid token; a missing or wrong
  bearer token is rejected 401 before any tool runs; and a valid token with no
  Origin reaches real MCP handling (200) — proving the Origin floor and token
  gate deterministically via smoke-http.ts.
