# E2E: ingest the test docs and find a step by meaning (needs the stack up).
id: TC-E2E-001
name: load test docs and query by meaning
suite: e2e
priority: 1
timeout: 120000
dependencies: [TC-INTEGRATION-001]
tags: [e2e]

steps:
  - name: Index the test docs into the store
    command: npm --prefix step-store run --silent load-tests
    timeout: 90000
    expectPatterns:
      - "indexed [0-9]+ row"

  - name: Find a stored step by a paraphrase
    command: make query Q="execute the smoke test over mcp"
    expectPatterns:
      # Hits the smoke step from TS-01 (a step-store test doc); the corpus and
      # this query move together — keep them aligned (verified ~0.20 distance).
      - "0\\.[0-9]+ +Run the smoke test over MCP"

criteria: |
  Test-doc steps are ingested into the pgvector store and findable by a
  paraphrase (a nearest hit under the distance threshold).
