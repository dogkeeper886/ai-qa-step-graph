# Build: the step-store source typechecks.
id: TC-BUILD-001
name: step-store typechecks
suite: build
priority: 1
timeout: 120000
dependencies: []
tags: [build]

steps:
  - name: TypeScript typecheck (step-store)
    command: cd step-store && npx tsc --noEmit
    timeout: 90000
    rejectPatterns:
      - "error TS"

criteria: |
  step-store compiles cleanly — no TypeScript errors. Verdict is exit 0 + no
  "error TS" in output; no LLM involved.
