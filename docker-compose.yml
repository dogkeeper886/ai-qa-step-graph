services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: stepstore
      POSTGRES_PASSWORD: stepstore
      POSTGRES_DB: stepstore
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./step-store/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stepstore -d stepstore"]
      interval: 2s
      timeout: 3s
      retries: 15

  mcp:
    build: ./step-store
    environment:
      DATABASE_URL: postgres://stepstore:stepstore@db:5432/stepstore
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3000"
      # LAN-reachable browser origins to allow-list (comma-separated). localhost
      # is always allowed; non-browser clients send no Origin and pass. See #69.
      MCP_ALLOWED_ORIGINS: "${MCP_ALLOWED_ORIGINS:-}"
      # Required in http mode (#70): the server refuses to start without it.
      # `make up` generates one into .env; clients send it as a bearer token.
      MCP_AUTH_TOKEN: "${MCP_AUTH_TOKEN:-}"
    # Default binds to localhost only — set MCP_BIND_HOST=0.0.0.0 (or a specific
    # LAN IP) to expose the server to other hosts. Postgres (db) stays private.
    ports:
      - "${MCP_BIND_HOST:-127.0.0.1}:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Hit the unauthenticated liveness probe and require a 2xx — so a 401
      # (auth on, no token) does not falsely read as healthy. See #70.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
